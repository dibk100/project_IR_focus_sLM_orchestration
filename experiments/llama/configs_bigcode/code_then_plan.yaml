# PYTHONPATH=. python -m src.orchestration.code_then_plan experiments/llama/configs_bigcode/code_then_plan.yaml

run:
  run_id: "llama31_8b_bigcode_code_then_plan"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  temperature: 0.2
  planner:
    name: "meta-llama/Llama-3.1-8B-Instruct"
    max_new_tokens: 256
    temperature: 0.2
  coder:
    name: "meta-llama/Llama-3.1-8B-Instruct"
    max_new_tokens: 512
    temperature: 0.2

method:
  name: "code_then_plan"

budget:
  max_calls: 20

output:
  dir: "results/llama/bigcode/code_then_plan"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: false
  save_code: false

debug:
  mode: "run"
