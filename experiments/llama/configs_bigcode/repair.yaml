# PYTHONPATH=. python -m src.orchestration.repair experiments/llama/configs_bigcode/repair.yaml

run:
  run_id: "llama31_8b_bigcode_repair"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  max_new_tokens: 512
  temperature: 0.2

method:
  name: "repair_loop"

budget:
  max_calls: 20

output:
  dir: "results/llama/bigcode/repair"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: false
  save_code: false

debug : 
  mode : "run" 