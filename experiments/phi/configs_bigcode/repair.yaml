# PYTHONPATH=. python -m src.orchestration.repair experiments/phi/configs_bigcode/repair.yaml

run:
  run_id: "phase2_phi25coder7b_bigcode_repair"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "microsoft/Phi-3.5-mini-instruct"
  max_new_tokens: 512
  temperature: 0.2

method:
  name: "repair_loop"

budget:
  max_calls: 20

output:
  dir: "results/phi/bigcode/repair"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: false
  save_code: false

debug : 
  mode : "run" 