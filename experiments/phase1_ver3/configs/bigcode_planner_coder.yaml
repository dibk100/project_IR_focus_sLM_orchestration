# Phase 1: BigCode Planner-Coder
# 사용법:
# PYTHONPATH=. python -m src.orchestration.planner_coder experiments/phase2_ver1/configs/bigcode_planner_coder.yaml

run:
  run_id: "phase1_qwen25coder7b_bigcode_planner_coder"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  temperature: 0.2
  planner:
    name: "Qwen/Qwen2.5-Coder-7B-Instruct"
    max_new_tokens: 256
    temperature: 0.2
  coder:
    name: "Qwen/Qwen2.5-Coder-7B-Instruct"
    max_new_tokens: 1024
    temperature: 0.2

method:
  name: "planner_coder"

budget:
  max_calls: 2

output:
  dir: "results/phase2_ver1/bigcode/planner_coder"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: true
  save_code: true
