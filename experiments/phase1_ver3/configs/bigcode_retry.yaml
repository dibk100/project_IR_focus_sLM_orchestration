# Phase 2: BigCode Retry (Refinement-only)
# 사용법:
# PYTHONPATH=. python -m src.orchestration.retry experiments/phase2_ver1/configs/bigcode_retry.yaml

run:
  run_id: "phase2_qwen25coder7b_bigcode_retry"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140    # 1140

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  max_new_tokens: 1024
  temperature: 0.2

method:
  name: "retry_only"
  use_previous_code: true

budget:
  max_calls: 3
  max_retry: 2

output:
  dir: "results/phase2_ver1/bigcode/retry"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: true
  save_code: true