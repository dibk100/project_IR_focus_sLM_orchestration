# Phase 1: BigCode Best-of-N
# 사용법:
# PYTHONPATH=. python -m src.orchestration.best_of_n experiments/phase2_ver1/configs/bigcode_bestOfN.yaml

run:
  run_id: "phase2_qwen25coder7b_bigcode_bestofn"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  max_new_tokens: 1024
  temperature: 0.2

method:
  name: "best_of_n"
  num_candidates: 3
  selector:
    rule: "pass_seeking"
    tie_break: "shortest_code"
    if_no_pass: "fail"

budget:
  max_calls: 3

output:
  dir: "results/phase2_ver1/bigcode/bestofn"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: true
  save_code: true