# PYTHONPATH=. python -m src.orchestration.repair experiments/qwen/configs_bigcode/repair.yaml

run:
  run_id: "phase1_qwen25coder7b_bigcode_repair"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  backend: "vllm_server"          # "hf" | "vllm_server"
  api_base: "http://localhost:8000/v1"
  max_new_tokens: 512
  temperature: 0.2

method:
  name: "repair_loop"

budget:
  max_calls: 20

output:
  dir: "results/qwen/bigcode/repair"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: false
  save_code: false

debug : 
  mode : "run" 