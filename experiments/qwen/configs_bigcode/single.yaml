# PYTHONPATH=. python -m src.orchestration.single experiments/qwen/configs_bigcode/single.yaml

run:
  run_id: "phase1_qwen25coder7b_bigcode_single"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  max_new_tokens: 512
  temperature: 0.2

method:
  name: "single_shot"

budget:
  max_calls: 1

output:
  dir: "results/qwen/bigcode/single"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: true
  save_code: false

debug : 
  mode : "run"