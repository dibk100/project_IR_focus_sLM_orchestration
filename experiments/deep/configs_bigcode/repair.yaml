# PYTHONPATH=. python -m src.orchestration.repair experiments/deep/configs_bigcode/repair.yaml

run:
  run_id: "deepcoder7b_bigcode_repair"
  seed: 42

dataset:
  name: "bigcode"
  num_samples: 1140

model:
  name: "deepseek-ai/deepseek-coder-7b-instruct-v1.5"
  backend: "vllm_server"          # "hf" | "vllm_server"
  api_base: "http://localhost:8000/v1"
  max_new_tokens: 512
  temperature: 0.2

method:
  name: "repair_loop"

budget:
  max_calls: 20

output:
  dir: "results/deepcoder7b/bigcode/repair"

logging:
  save_step_level: true
  save_trajectory_level: true
  save_problem_summary: true
  save_run_analysis: false
  save_code: false

debug : 
  mode : "run" 